<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Diary</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Work Sans',sans-serif;background:#ede8dd;color:#3d3428;padding:2rem;min-height:100vh;}
.container{max-width:1200px;margin:0 auto;}
h1{font-size:28px;margin-bottom:0.5rem;color:#3d3428;}
.subtitle{font-size:14px;color:#6b5d4f;margin-bottom:2rem;}
.top-bar{display:flex;align-items:center;gap:12px;margin-bottom:1rem;flex-wrap:wrap;}
.date-label{font-size:14px;font-weight:600;color:#6b5d4f;}
.date-input{padding:8px 12px;font-size:14px;border:1px solid #d4c4a8;border-radius:8px;background:#faf8f3;color:#3d3428;font-family:'Work Sans',sans-serif;cursor:pointer;}
.btn{padding:10px 16px;background:#e8dcc8;color:#7a6449;border:1px solid #d4c4a8;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;font-family:'Work Sans',sans-serif;}
.btn:hover{background:#f5e6d3;}
.btn.settings{margin-left:auto;}
.match-row{display:grid;grid-template-columns:90px 140px 1fr 80px 140px 24px;gap:16px;align-items:center;padding:12px 0;border-bottom:1px solid rgba(61,52,40,0.08);}
.match-row:hover{background:#f5f1e8;padding:12px 8px;margin:0 -8px;border-radius:6px;}
.sport-badge{padding:4px 8px;background:#e8dcc8;color:#7a6449;border-radius:5px;font-size:9px;font-weight:600;text-transform:uppercase;text-align:center;}
.competition{font-size:11px;color:#6b5d4f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.match-scores{display:flex;align-items:center;gap:8px;min-width:0;}
.team-name{font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.team-name.left{text-align:right;}
.team-name.right{text-align:left;}
.score-box{width:32px;height:28px;text-align:center;font-size:14px;font-weight:700;border:1px solid rgba(61,52,40,0.08);border-radius:6px;background:#faf8f3;font-family:'Space Mono',monospace;padding:0;color:#3d3428;}
.score-sep{font-size:12px;color:#6b5d4f;}
select{padding:6px 8px;font-size:13px;border:1px solid #d4c4a8;border-radius:6px;background:#faf8f3;color:#3d3428;cursor:pointer;font-family:'Work Sans',sans-serif;}
.delete-btn{padding:0;border:none;background:transparent;color:#6b5d4f;opacity:0.5;font-size:14px;cursor:pointer;}
.delete-btn:hover{opacity:1;color:#ba4c4c;}
.empty{text-align:center;padding:3rem;color:#6b5d4f;}
.stage-tag{font-size:10px;color:#6b5d4f;font-family:'Space Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
.winner{color:#6d7a4b;font-weight:700;}
.draw{color:#7a6449;}
.status-bar{font-size:12px;color:#6b5d4f;padding:6px 0 14px;display:flex;align-items:center;gap:6px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:#6d7a4b;display:inline-block;flex-shrink:0;}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(61,52,40,0.4);backdrop-filter:blur(2px);z-index:1000;justify-content:center;align-items:center;}
.overlay.open{display:flex;}
.modal{background:#ede8dd;border:2px solid #3d3428;border-radius:12px;padding:2rem;width:90%;max-width:520px;box-shadow:0 10px 25px rgba(0,0,0,0.1);max-height:90vh;overflow-y:auto;}
.modal h3{font-size:20px;margin-bottom:1.5rem;border-bottom:1px solid rgba(61,52,40,0.1);padding-bottom:0.5rem;}
.form-group{margin-bottom:1.2rem;display:flex;flex-direction:column;gap:6px;}
.form-group label{font-size:12px;font-weight:700;color:#6b5d4f;text-transform:uppercase;}
.form-group select,.form-group input[type=text],.form-group input[type=number]{width:100%;padding:10px;font-size:13px;border:1px solid #d4c4a8;border-radius:6px;background:#faf8f3;color:#3d3428;font-family:'Work Sans',sans-serif;}
.score-row{display:flex;align-items:center;gap:12px;}
.score-row input{text-align:center;font-family:'Space Mono',monospace;font-weight:700;flex:1;}
.modal-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:1.5rem;}
.modal-btn{padding:10px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Work Sans',sans-serif;}
.modal-btn.save{background:#6d7a4b;color:white;border:none;}
.modal-btn.save:hover{background:#5a6840;}
.modal-btn.cancel{background:transparent;border:1px solid #6b5d4f;color:#6b5d4f;}
.modal-btn.cancel:hover{background:#e8dcc8;}
.tabs{display:flex;gap:2px;margin-bottom:1.5rem;background:#e8dcc8;border-radius:8px;padding:3px;}
.tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;border-radius:6px;color:#7a6449;border:none;background:transparent;font-family:'Work Sans',sans-serif;}
.tab.active{background:#ede8dd;color:#3d3428;}
.settings-section{margin-bottom:2rem;}
.settings-section h4{font-size:13px;font-weight:700;color:#6b5d4f;text-transform:uppercase;margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:1px solid rgba(61,52,40,0.1);}
.settings-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap;}
.settings-row select,.settings-row input{flex:1;min-width:100px;padding:8px 10px;font-size:13px;border:1px solid #d4c4a8;border-radius:6px;background:#faf8f3;color:#3d3428;font-family:'Work Sans',sans-serif;}
.btn-sm{padding:6px 12px;font-size:12px;background:#6d7a4b;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:600;white-space:nowrap;font-family:'Work Sans',sans-serif;}
.btn-sm:hover{background:#5a6840;}
.btn-sm.danger{background:#ba4c4c;}
.btn-sm.danger:hover{background:#9a3c3c;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.tag{padding:4px 10px;background:#e8dcc8;color:#7a6449;border-radius:20px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;}
.tag button{background:none;border:none;cursor:pointer;color:#7a6449;font-size:11px;padding:0;line-height:1;}
.tag button:hover{color:#ba4c4c;}
</style>
</head>
<body>
<div class="container">
  <h1>Match diary</h1>
  <p class="subtitle">Track matches you plan to watch and update results</p>
  <div class="top-bar">
    <span class="date-label">Select Day:</span>
    <input type="date" id="diary-date" class="date-input">
    <button class="btn" onclick="openModal()">+ Add match</button>
    <button class="btn settings" onclick="openSettings()">⚙ Manage leagues</button>
  </div>
  <div id="status-bar" class="status-bar">
    <span class="status-dot" id="sdot"></span>
    <span id="status-msg">Using Local Browser Storage</span>
  </div>
  <div id="matches"></div>
</div>

<!-- Add Match Modal -->
<div class="overlay" id="add-modal">
  <div class="modal">
    <h3>Log New Match</h3>
    <div class="form-group">
      <label>1. Choose Sport</label>
      <select id="modal-sport" onchange="onSportChange()"><option value="">-- Select Sport --</option></select>
    </div>
    <div class="form-group">
      <label>2. Choose Competition</label>
      <select id="modal-comp" onchange="onCompChange()" disabled><option value="">-- Select Competition --</option></select>
    </div>
    <div class="form-group">
      <label>3. Choose Team A</label>
      <select id="modal-teamA" onchange="onTeamAChange()" disabled><option value="">-- Select Team A --</option></select>
    </div>
    <div class="form-group">
      <label>4. Choose Team B</label>
      <select id="modal-teamB" disabled><option value="">-- Select Team B --</option></select>
    </div>
    <div class="form-group">
      <label>5. Week / Stage (Optional)</label>
      <input type="text" id="modal-stage" placeholder="e.g. GW38, Quarter-Final, MD12…">
    </div>
    <div class="form-group">
      <label>6. Enter Initial Scores (Optional)</label>
      <div class="score-row">
        <input type="number" id="modal-scoreA" placeholder="-" min="0">
        <span>vs</span>
        <input type="number" id="modal-scoreB" placeholder="-" min="0">
      </div>
    </div>
    <div class="form-group">
      <label>7. Watch Status</label>
      <select id="modal-status">
        <option>Not watched</option><option>Full</option><option>Highlights</option><option>Just score</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn save" onclick="submitMatch()">Save Entry</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="overlay" id="settings-modal">
  <div class="modal" style="max-width:600px;">
    <h3>Manage Leagues &amp; Teams</h3>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('sports')" id="tab-sports">Sports</button>
      <button class="tab" onclick="switchTab('leagues')" id="tab-leagues">Leagues</button>
      <button class="tab" onclick="switchTab('teams')" id="tab-teams">Teams</button>
    </div>
    <div id="pane-sports">
      <div class="settings-section">
        <h4>Add new sport</h4>
        <div class="settings-row">
          <input type="text" id="new-sport-name" placeholder="e.g. Tennis, Rugby, Cricket">
          <button class="btn-sm" onclick="addSport()">Add sport</button>
        </div>
      </div>
      <div class="settings-section">
        <h4>Existing sports</h4>
        <div id="sport-list" class="tag-list"></div>
      </div>
    </div>
    <div id="pane-leagues" style="display:none;">
      <div class="settings-section">
        <h4>Add new league</h4>
        <div class="settings-row">
          <select id="league-sport-sel"><option value="">-- Sport --</option></select>
          <input type="text" id="new-league-name" placeholder="e.g. Serie B, NBA G League">
          <button class="btn-sm" onclick="addLeague()">Add</button>
        </div>
      </div>
      <div class="settings-section">
        <h4>Remove league</h4>
        <div class="settings-row">
          <select id="remove-league-sport" onchange="populateRemoveLeagues()"><option value="">-- Sport --</option></select>
          <select id="remove-league-name"><option value="">-- League --</option></select>
          <button class="btn-sm danger" onclick="removeLeague()">Remove</button>
        </div>
      </div>
    </div>
    <div id="pane-teams" style="display:none;">
      <div class="settings-section">
        <h4>Add team to a league</h4>
        <div class="settings-row">
          <select id="team-sport-sel" onchange="populateTeamLeagues('team-league-sel')"><option value="">-- Sport --</option></select>
          <select id="team-league-sel"><option value="">-- League --</option></select>
        </div>
        <div class="settings-row" style="margin-top:6px;">
          <input type="text" id="new-team-name" placeholder="Team name">
          <button class="btn-sm" onclick="addTeam()">Add team</button>
        </div>
      </div>
      <div class="settings-section">
        <h4>Remove team</h4>
        <div class="settings-row">
          <select id="rm-team-sport" onchange="populateTeamLeagues('rm-team-league');document.getElementById('rm-team-name').innerHTML='<option value=\\'\\'>-- Team --</option>'"><option value="">-- Sport --</option></select>
          <select id="rm-team-league" onchange="populateRmTeams()"><option value="">-- League --</option></select>
          <select id="rm-team-name"><option value="">-- Team --</option></select>
          <button class="btn-sm danger" onclick="removeTeam()">Remove</button>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeSettings()">Close</button>
    </div>
  </div>
</div>

const STATUS_OPTIONS = ['Not watched','Full','Highlights','Just score'];
let SPORTS = JSON.parse(JSON.stringify(DEFAULT_SPORTS));
let selectedDate = new Date().toISOString().split('T')[0];

document.getElementById('diary-date').value = selectedDate;
document.getElementById('diary-date').addEventListener('change', e => { selectedDate = e.target.value; render(); });

function setStatus(msg, state='ok') {
  document.getElementById('status-msg').textContent = msg;
  const dot = document.getElementById('sdot');
  dot.className = 'status-dot' + (state==='loading' ? ' loading' : state==='error' ? ' error' : '');
}

function init() {
  setStatus('Using Local Storage — Saved locally on your device');
  const saved = localStorage.getItem('sports-config');
  if (saved) SPORTS = JSON.parse(saved);
  render();
}

function getMatches() {
  const data = localStorage.getItem(`matches-${selectedDate}`);
  return data ? JSON.parse(data) : [];
}

function saveMatches(matches) {
  localStorage.setItem(`matches-${selectedDate}`, JSON.stringify(matches));
}

function saveSports() {
  localStorage.setItem('sports-config', JSON.stringify(SPORTS));
}

function openModal() {
  document.getElementById('add-modal').classList.add('open');
  const sp = document.getElementById('modal-sport');
  sp.innerHTML = '<option value="">-- Select Sport --</option>' + Object.keys(SPORTS).map(s=>`<option value="${s}">${s}</option>`).join('');
  ['modal-comp','modal-teamA','modal-teamB'].forEach(id => {
    document.getElementById(id).innerHTML = '<option value="">-- Select --</option>';
    document.getElementById(id).disabled = true;
  });
  document.getElementById('modal-scoreA').value = '';
  document.getElementById('modal-scoreB').value = '';
  document.getElementById('modal-stage').value = '';
  document.getElementById('modal-status').value = 'Not watched';
}
function closeModal() { document.getElementById('add-modal').classList.remove('open'); }

function onSportChange() {
  const sp = document.getElementById('modal-sport').value;
  const c = document.getElementById('modal-comp');
  if (!sp) { c.innerHTML='<option value="">-- Select Competition --</option>'; c.disabled=true; return; }
  c.innerHTML = '<option value="">-- Select Competition --</option>' + Object.keys(SPORTS[sp]).map(l=>`<option value="${l}">${l}</option>`).join('');
  c.disabled = false;
  document.getElementById('modal-teamA').innerHTML='<option value="">-- Select Team A --</option>'; document.getElementById('modal-teamA').disabled=true;
  document.getElementById('modal-teamB').innerHTML='<option value="">-- Select Team B --</option>'; document.getElementById('modal-teamB').disabled=true;
}
function onCompChange() {
  const sp=document.getElementById('modal-sport').value, comp=document.getElementById('modal-comp').value;
  const ta=document.getElementById('modal-teamA');
  if (!comp) { ta.innerHTML='<option value="">-- Select Team A --</option>'; ta.disabled=true; return; }
  ta.innerHTML = '<option value="">-- Select Team A --</option>' + SPORTS[sp][comp].map(t=>`<option value="${t}">${t}</option>`).join('');
  ta.disabled = false;
  document.getElementById('modal-teamB').innerHTML='<option value="">-- Select Team B --</option>'; document.getElementById('modal-teamB').disabled=true;
}
function onTeamAChange() {
  const sp=document.getElementById('modal-sport').value, comp=document.getElementById('modal-comp').value, tA=document.getElementById('modal-teamA').value;
  const tb=document.getElementById('modal-teamB');
  if (!tA) { tb.innerHTML='<option value="">-- Select Team B --</option>'; tb.disabled=true; return; }
  tb.innerHTML = '<option value="">-- Select Team B --</option>' + SPORTS[sp][comp].filter(t=>t!==tA).map(t=>`<option value="${t}">${t}</option>`).join('');
  tb.disabled = false;
}

function submitMatch() {
  const sp=document.getElementById('modal-sport').value, comp=document.getElementById('modal-comp').value;
  const tA=document.getElementById('modal-teamA').value, tB=document.getElementById('modal-teamB').value;
  const vA=document.getElementById('modal-scoreA').value, vB=document.getElementById('modal-scoreB').value;
  const stage=document.getElementById('modal-stage').value.trim();
  const status=document.getElementById('modal-status').value;
  if (!sp||!comp||!tA||!tB) { alert('Please complete steps 1–4.'); return; }
  
  const matches = getMatches();
  matches.push({ id:Date.now(), sport:sp, comp, teamA:tA, teamB:tB, scoreA:vA.trim()!==''?parseInt(vA):null, scoreB:vB.trim()!==''?parseInt(vB):null, stage:stage||null, status });
  saveMatches(matches);
  closeModal(); 
  render();
}

function updateScore(id, field, value) {
  const matches = getMatches();
  const m = matches.find(m=>m.id===id);
  if (m) { m[field] = value.trim()!=='' ? parseInt(value) : null; saveMatches(matches); render(); }
}
function updateStatus(id, status) {
  const matches = getMatches();
  const m = matches.find(m=>m.id===id);
  if (m) { m.status = status; saveMatches(matches); }
}
function deleteMatch(id) {
  const matches = getMatches().filter(m=>m.id!==id);
  saveMatches(matches); render();
}

function getWinner(m) {
  if (m.scoreA===null||m.scoreB===null||isNaN(m.scoreA)||isNaN(m.scoreB)) return null;
  if (m.scoreA>m.scoreB) return 'A'; if (m.scoreB>m.scoreA) return 'B'; return 'D';
}

function render() {
  const matches = getMatches();
  const c = document.getElementById('matches');
  if (!matches.length) { c.innerHTML=`<div class="empty">No matches logged for ${selectedDate}</div>`; return; }
  c.innerHTML = matches.map(m => {
    const w = getWinner(m);
    return `<div class="match-row">
      <span class="sport-badge">${m.sport.substring(0,5)}</span>
      <div class="competition">${m.comp}</div>
      <div class="match-scores">
        <span class="team-name left ${w==='A'?'winner':''} ${w==='D'?'draw':''}">${w==='A'?'✓ ':''}${m.teamA}</span>
        <input type="text" maxlength="3" class="score-box" value="${m.scoreA??''}" onchange="updateScore(${m.id},'scoreA',this.value)" placeholder="-">
        <span class="score-sep">-</span>
        <input type="text" maxlength="3" class="score-box" value="${m.scoreB??''}" onchange="updateScore(${m.id},'scoreB',this.value)" placeholder="-">
        <span class="team-name right ${w==='B'?'winner':''} ${w==='D'?'draw':''}">${m.teamB}${w==='B'?' ✓':''}</span>
      </div>
      <div class="stage-tag">${m.stage||''}</div>
      <select onchange="updateStatus(${m.id},this.value)">${STATUS_OPTIONS.map(s=>`<option value="${s}" ${m.status===s?'selected':''}>${s}</option>`).join('')}</select>
      <button class="delete-btn" onclick="deleteMatch(${m.id})">✕</button>
    </div>`;
  }).join('');
}

/* Settings */
function openSettings() { document.getElementById('settings-modal').classList.add('open'); switchTab('sports'); }
function closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }
function switchTab(tab) {
  ['sports','leagues','teams'].forEach(t => {
    document.getElementById('pane-'+t).style.display = t===tab?'block':'none';
    document.getElementById('tab-'+t).className = 'tab'+(t===tab?' active':'');
  });
  if (tab==='leagues'||tab==='teams') populateSettingsSports();
}
function populateSettingsSports() {
  const sports = Object.keys(SPORTS);
  ['league-sport-sel','remove-league-sport','team-sport-sel','rm-team-sport'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = '<option value="">-- Sport --</option>' + sports.map(s=>`<option value="${s}">${s}</option>`).join('');
  });
  renderSportTags();
}
function renderSportTags() {
  document.getElementById('sport-list').innerHTML = Object.keys(SPORTS).map(s=>
    `<span class="tag">${s} <button onclick="removeSport('${s}')">✕</button></span>`).join('');
}
function addSport() {
  const name = document.getElementById('new-sport-name').value.trim();
  if (!name) return;
  if (SPORTS[name]) { alert('Sport already exists.'); return; }
  SPORTS[name] = {};
  saveSports();
  document.getElementById('new-sport-name').value = '';
  renderSportTags(); populateSettingsSports();
}
function removeSport(name) {
  if (!confirm(`Remove "${name}" and all its leagues?`)) return;
  delete SPORTS[name]; saveSports(); renderSportTags(); populateSettingsSports();
}
function populateRemoveLeagues() {
  const sp = document.getElementById('remove-league-sport').value;
  const el = document.getElementById('remove-league-name');
  el.innerHTML = '<option value="">-- League --</option>' + Object.keys(SPORTS[sp]||{}).map(l=>`<option value="${l}">${l}</option>`).join('');
}
function addLeague() {
  const sp=document.getElementById('league-sport-sel').value, name=document.getElementById('new-league-name').value.trim();
  if (!sp||!name) { alert('Select a sport and enter a league name.'); return; }
  if (SPORTS[sp][name]) { alert('League already exists.'); return; }
  SPORTS[sp][name] = []; saveSports();
  document.getElementById('new-league-name').value = '';
  alert(`"${name}" added to ${sp}.`);
}
function removeLeague() {
  const sp=document.getElementById('remove-league-sport').value, name=document.getElementById('remove-league-name').value;
  if (!sp||!name) { alert('Select a sport and league.'); return; }
  if (!confirm(`Remove "${name}" from ${sp}?`)) return;
  delete SPORTS[sp][name]; saveSports();
  populateRemoveLeagues(); alert(`"${name}" removed.`);
}
function populateTeamLeagues(targetId) {
  const sportSelId = targetId==='team-league-sel' ? 'team-sport-sel' : 'rm-team-sport';
  const sp = document.getElementById(sportSelId).value;
  const el = document.getElementById(targetId);
  if (!el) return;
  el.innerHTML = '<option value="">-- League --</option>' + Object.keys(SPORTS[sp]||{}).map(l=>`<option value="${l}">${l}</option>`).join('');
}
function populateRmTeams() {
  const sp=document.getElementById('rm-team-sport').value, league=document.getElementById('rm-team-league').value;
  const el=document.getElementById('rm-team-name');
  el.innerHTML = '<option value="">-- Team --</option>' + (SPORTS[sp]&&SPORTS[sp][league]?SPORTS[sp][league]:[]).map(t=>`<option value="${t}">${t}</option>`).join('');
}
function addTeam() {
  const sp=document.getElementById('team-sport-sel').value, league=document.getElementById('team-league-sel').value, name=document.getElementById('new-team-name').value.trim();
  if (!sp||!league||!name) { alert('Select a sport, league, and enter a team name.'); return; }
  if (SPORTS[sp][league].includes(name)) { alert('Team already exists.'); return; }
  SPORTS[sp][league].push(name); SPORTS[sp][league].sort(); saveSports();
  document.getElementById('new-team-name').value = '';
  alert(`"${name}" added to ${league}.`);
}
function removeTeam() {
  const sp=document.getElementById('rm-team-sport').value, league=document.getElementById('rm-team-league').value, name=document.getElementById('rm-team-name').value;
  if (!sp||!league||!name) { alert('Select sport, league, and team.'); return; }
  if (!confirm(`Remove "${name}" from ${league}?`)) return;
  SPORTS[sp][league] = SPORTS[sp][league].filter(t=>t!==name); saveSports();
  populateRmTeams(); alert(`"${name}" removed.`);
}

// Start the app
init();
